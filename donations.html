<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donations</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body id="donations-body">
    <header>
        <h1>A WILD RIDE</h1>
        <!-- <h3>A Site Showcasing Endangered Animal Species All Over The Planet</h3> -->

        <div class="links">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="savannah.html">Savannah</a></li>
                <li><a href="rainforests.html">Rainforests</a></li>
                <li><a href="arctic.html">The Arctic</a></li>
                <li><a href="aquatic.html">Aquatic Life</a></li>
                <li><a href="#" class="current-page">Donate Here</a></li>
            </ul>

        </div>
    </header>

    <div>
        <form class="donation-form">
            <label>Thank You For Your Interest In Donating!<br><br>Please Enter Your Name</label><br>
            <input type="text" placeholder="John Doe" required><br>
            <label>Please Enter Your Email</label><br>
            <input type="email" placeholder="example@mail.com" required><br>

            <label>Please Select The Biomes You Are Interested In Donating To:</label><br>

            <div class="biomes">
                <input type="checkbox" id="savannah">
                <label for="savannah">Savannah</label><br>
                <input type="checkbox" id="rainforests">
                <label for="rainforests">Rainforests</label><br>
                <input type="checkbox" id="arctic">
                <label for="arctic">The Arctic</label><br>
                <input type="checkbox" id="aquatic">
                <label for="aquatic">Aquatic Life</label><br>
                <input type="submit" id="submit-button">
            </div>
        </form>
    </div>
    <div class="thanks-message"></div>
</body>
</html>
